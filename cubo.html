<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Creador de Regalo - Cubo del Amor</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* BLINDAJE: Oculto por defecto para evitar parpadeos visuales si intenta vulnerar la URL */
        body {
            display: none;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh; width: 100vw;
            flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; color: white;
        }

        #particles-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* --- PANTALLA 1: CREADOR (SETUP) --- */
        #setup-screen {
            position: absolute;
            z-index: 50;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 51, 102, 0.5);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%; max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.2);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #setup-screen h2 {
            color: #ff3366; font-size: 1.8rem;
            margin-bottom: 30px; text-transform: uppercase;
            letter-spacing: 2px;
        }

        .step { margin-bottom: 25px; }
        .step p { font-size: 0.9rem; margin-bottom: 10px; color: #ccc; letter-spacing: 1px; }

        .upload-btn {
            display: inline-block;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #fff;
            color: white; padding: 12px 20px;
            border-radius: 10px; cursor: pointer;
            width: 100%; font-size: 1rem;
            transition: all 0.3s ease;
        }

        .upload-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .upload-btn.ready { background: #2ecc71; border-color: #27ae60; color: #fff; font-weight: bold; }
        
        input[type="file"] { display: none; }

        .magic-btn {
            background: linear-gradient(45deg, #ff3366, #ff0044);
            border: none; border-radius: 50px;
            color: white; padding: 15px 0;
            width: 100%; font-size: 1.2rem; font-weight: bold;
            cursor: not-allowed; opacity: 0.5;
            transition: all 0.3s;
            margin-top: 10px; text-transform: uppercase;
        }

        .magic-btn.active { cursor: pointer; opacity: 1; box-shadow: 0 0 20px rgba(255, 51, 102, 0.6); }
        .magic-btn.active:active { transform: scale(0.95); }

        /* --- PANTALLA 2: CUBO Y AUDIO --- */
        #cube-screen {
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: center;
            position: absolute; z-index: 10; opacity: 0;
            transition: opacity 1s ease;
        }

        .title {
            position: absolute; top: 10%;
            font-family: 'Dancing Script', cursive; font-size: 3.5rem;
            color: #ff3366; text-shadow: 0 0 15px rgba(255, 51, 102, 0.6);
            text-align: center; width: 100%;
        }

        .scene { width: 220px; height: 220px; perspective: 800px; z-index: 10; }
        
        .cube {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transform: translateZ(-110px) rotateX(-15deg) rotateY(0deg);
        }

        .face {
            position: absolute; width: 220px; height: 220px;
            border: 2px solid rgba(255, 51, 102, 0.8);
            box-shadow: 0 0 25px rgba(255, 51, 102, 0.4), inset 0 0 15px rgba(255, 51, 102, 0.3);
            background-color: #111; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .face img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .front  { transform: rotateY(  0deg) translateZ(110px); }
        .back   { transform: rotateY(180deg) translateZ(110px); }
        .right  { transform: rotateY( 90deg) translateZ(110px); }
        .left   { transform: rotateY(-90deg) translateZ(110px); }
        .top    { transform: rotateX( 90deg) translateZ(110px); }
        .bottom { transform: rotateX(-90deg) translateZ(110px); }

        .audio-player {
            position: absolute; bottom: 8%; width: 90%; max-width: 400px;
            background: rgba(20, 20, 20, 0.8); border: 1px solid #ff3366; border-radius: 50px;
            padding: 10px 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.3); backdrop-filter: blur(5px);
        }

        .play-btn {
            background: #ff3366; border: none; width: 45px; height: 45px; border-radius: 50%;
            color: white; font-size: 1.2rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: transform 0.2s;
        }
        .play-btn:active { transform: scale(0.9); }

        .progress-container {
            flex-grow: 1; height: 6px; background: rgba(255, 255, 255, 0.2);
            border-radius: 10px; cursor: pointer; position: relative;
        }
        .progress-bar {
            height: 100%; width: 0%; background: #ff3366; border-radius: 10px;
            box-shadow: 0 0 10px #ff3366; position: relative;
        }
        .progress-bar::after {
            content: ''; position: absolute; right: -5px; top: -4px;
            width: 14px; height: 14px; background: #fff; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div id="setup-screen">
        <h2>Cubo para mi amor</h2>
        
        <div class="step">
            <p>1. SELECCIONA 6 FOTOS TUYAS Y MIAS</p>
            <label for="image-upload" class="upload-btn" id="lbl-images">📷 Abrir Galería</label>
            <input type="file" id="image-upload" accept="image/*" multiple>
        </div>

        <div class="step">
            <p>2. ELIGE LA CANCIÓN</p>
            <label for="audio-upload" class="upload-btn" id="lbl-audio">🎵 Cargar MP3</label>
            <input type="file" id="audio-upload" accept="audio/*">
        </div>

        <button class="magic-btn" id="btn-create" disabled>✨ Crear Magia ✨</button>
    </div>

    <div id="cube-screen">
        <h1 class="title">Te Quiero mi amor ❤️</h1>
        <div class="scene">
            <div class="cube" id="cube">
                <div class="face front"><img id="img1" src=""></div>
                <div class="face back"><img id="img2" src=""></div>
                <div class="face right"><img id="img3" src=""></div>
                <div class="face left"><img id="img4" src=""></div>
                <div class="face top"><img id="img5" src=""></div>
                <div class="face bottom"><img id="img6" src=""></div>
            </div>
        </div>

        <audio id="audio" loop></audio>
        <div class="audio-player">
            <button class="play-btn" id="playBtn">II</button>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE FIREBASE (Usa los mismos datos del index) ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUI",
            authDomain: "TU_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://TU_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_PROJECT_ID.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- MOTOR DE ENTRADA CONTROLADA ---
        async function validarAccesoDirecto() {
            try {
                const res = await fetch('https://worldtimeapi.org/api/timezone/America/Caracas');
                if(!res.ok) throw new Error();
                const data = await res.json();
                const fecha = new Date(data.datetime);
                
                // Si manipula el reloj local y aún no es 18, expulsión radical al index
                if (fecha.getDate() < 18) {
                    window.location.href = 'index.html';
                    return;
                }
            } catch(e) {
                // Si apaga internet para esquivar la API, rebota al login por seguridad
                window.location.href = 'index.html';
                return;
            }

            // Cruzar verificación con la elección persistente en la nube de Google
            db.ref('proyecto_magico/eleccion').once('value', (snapshot) => {
                const eleccion = snapshot.val();
                if (eleccion === 'cubo') {
                    document.body.style.display = 'flex'; // Revelar interfaz de forma segura
                } else {
                    window.location.href = 'index.html'; // Expulsar intruso
                }
            });
        }
        validarAccesoDirecto();

        /* ==========================================
           1. SISTEMA DE ARCHIVOS (SPA LOGIC)
           ========================================== */
        const imgInput = document.getElementById('image-upload');
        const audInput = document.getElementById('audio-upload');
        const lblImages = document.getElementById('lbl-images');
        const lblAudio = document.getElementById('lbl-audio');
        const btnCreate = document.getElementById('btn-create');

        let selectedImages = [];
        let selectedAudio = null;

        imgInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length < 6) {
                alert("Por favor, selecciona al menos 6 fotos para armar el cubo completo.");
                lblImages.classList.remove('ready');
                lblImages.innerText = "📷 Abrir Galería";
                selectedImages = [];
            } else {
                selectedImages = files.slice(0, 6);
                lblImages.classList.add('ready');
                lblImages.innerText = "✅ ¡6 Fotos Listas!";
            }
            checkReady();
        });

        audInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedAudio = e.target.files[0];
                lblAudio.classList.add('ready');
                lblAudio.innerText = "✅ ¡Música Lista!";
            }
            checkReady();
        });

        function checkReady() {
            if (selectedImages.length === 6 && selectedAudio) {
                btnCreate.disabled = false;
                btnCreate.classList.add('active');
            } else {
                btnCreate.disabled = true;
                btnCreate.classList.remove('active');
            }
        }

        btnCreate.addEventListener('click', () => {
            if (btnCreate.disabled) return;

            document.getElementById('img1').src = URL.createObjectURL(selectedImages[0]);
            document.getElementById('img2').src = URL.createObjectURL(selectedImages[1]);
            document.getElementById('img3').src = URL.createObjectURL(selectedImages[2]);
            document.getElementById('img4').src = URL.createObjectURL(selectedImages[3]);
            document.getElementById('img5').src = URL.createObjectURL(selectedImages[4]);
            document.getElementById('img6').src = URL.createObjectURL(selectedImages[5]);
            
            const audioEl = document.getElementById('audio');
            audioEl.src = URL.createObjectURL(selectedAudio);

            const setupScreen = document.getElementById('setup-screen');
            const cubeScreen = document.getElementById('cube-screen');

            setupScreen.style.transform = 'scale(0.8)';
            setupScreen.style.opacity = '0';
            
            setTimeout(() => {
                setupScreen.style.display = 'none';
                cubeScreen.style.display = 'flex';
                void cubeScreen.offsetWidth; 
                cubeScreen.style.opacity = '1';
                
                audioEl.play().catch(e => console.log("Autoplay prevenido. Requiere interacción de audio."));
                isPlaying = true;
                initCubeMotor();
            }, 500);
        });

        /* ==========================================
           2. MOTOR DEL REPRODUCTOR DE AUDIO
           ========================================== */
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        let isPlaying = false;

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPlaying) { audio.pause(); playBtn.innerText = '▶'; } 
            else { audio.play(); playBtn.innerText = 'II'; }
            isPlaying = !isPlaying;
        });

        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            }
        });

        progressContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            const width = progressContainer.clientWidth;
            audio.currentTime = (e.offsetX / width) * audio.duration;
        });

        /* ==========================================
           3. MOTOR DE FÍSICA Y ROTACIÓN DEL CUBO
           ========================================== */
        const cube = document.getElementById('cube');
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotation = { x: -15, y: 45 };
        let autoRotate = true;

        function updateCubeRotation() {
            cube.style.transform = `translateZ(-110px) rotateX(${rotation.x}deg) rotateY(${rotation.y}deg)`;
        }

        function initCubeMotor() {
            function animate() {
                if (autoRotate) { rotation.y += 0.2; updateCubeRotation(); }
                requestAnimationFrame(animate);
            }
            animate();
        }

        function handleStart(e) {
            if(e.target.closest('.audio-player')) return; 
            isDragging = true; autoRotate = false;
            cube.style.transition = 'none';
            previousMousePosition = { 
                x: e.type.includes('mouse') ? e.clientX : e.touches[0].clientX, 
                y: e.type.includes('mouse') ? e.clientY : e.touches[0].clientY 
            };
        }

        function handleMove(e) {
            if (!isDragging) return;
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            rotation.y += (clientX - previousMousePosition.x) / 2;
            rotation.x -= (clientY - previousMousePosition.y) / 2;
            rotation.x = Math.max(-90, Math.min(90, rotation.x)); 
            updateCubeRotation();
            
            previousMousePosition = { x: clientX, y: clientY };
        }

        function handleEnd() {
            isDragging = false; autoRotate = true;
            cube.style.transition = 'transform 0.1s ease-out';
        }

        document.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);
        document.addEventListener('touchstart', handleStart, {passive: false});
        document.addEventListener('touchmove', handleMove, {passive: false});
        document.addEventListener('touchend', handleEnd);

        /* ==========================================
           4. SISTEMA DE PARTÍCULAS (FONDO)
           ========================================== */
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const particles = [];
        const emojis = ['🌸', '❤️', '🌸', '💖'];

        function resizeCanvas() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * 15 + 10;
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 2;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX; this.rotation += this.rotationSpeed;
                if (this.y > height + 20) { this.y = -20; this.x = Math.random() * width; }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation * Math.PI / 180);
                ctx.font = `${this.size}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, 0, 0); ctx.restore();
            }
        }

        for (let i = 0; i < 40; i++) particles.push(new Particle());
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
