<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Sorpresa</title>
    <!-- Fuente romántica para la carta -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffb6c1; /* Fondo rosa pastel del video */
            background-image: radial-gradient(circle, #ffd1dc 20%, #ffb6c1 80%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        /* Contenedor principal del regalo */
        .gift-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-top: 100px;
        }

        /* La carta oculta dentro de la caja */
        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 180px;
            height: 260px;
            background: #fff;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 1; /* Detrás del frente de la caja */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .letter h1 {
            font-family: 'Dancing Script', cursive;
            color: #e74c3c;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .letter p {
            font-size: 0.9rem;
            color: #333;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .letter img {
            width: 80px;
            height: auto;
            border-radius: 50%;
            /* Puedes cambiar esta URL por la imagen que quieras usar en tu repositorio */
            content: url('https://api.dicebear.com/7.x/adventurer/svg?seed=Love'); 
        }

        /* La parte inferior de la caja */
        .box-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: #e74c3c;
            border-radius: 8px;
            z-index: 2;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Listones de la caja inferior */
        .box-bottom::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 100%;
            background: #f1c40f;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }
        .box-bottom::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            height: 30px;
            background: #f1c40f;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        /* Contenedor de la tapa y el moño (Lo que se arrastra) */
        .lid-wrapper {
            position: absolute;
            top: 25px; /* Posición inicial alineada con la caja */
            left: -10px;
            width: 220px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Moño (🎀) */
        .bow {
            font-size: 60px;
            margin-bottom: -20px;
            cursor: grab;
            user-select: none;
            touch-action: none; /* Previene el scroll al arrastrar en móviles */
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            transition: transform 0.1s;
        }
        
        .bow:active {
            cursor: grabbing;
        }

        /* Tapa física de la caja */
        .box-lid {
            width: 100%;
            height: 40px;
            background: #c0392b;
            border-radius: 6px;
            position: relative;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        /* Listón vertical de la tapa */
        .box-lid::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 100%;
            background: #f1c40f;
        }

        /* Texto de instrucción */
        .instruction {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            text-align: center;
            color: #d81b60;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            animation: pulseText 2s infinite;
            transition: opacity 0.3s;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        /* Sistema de partículas (Corazones) */
        .heart-particle {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-400px) scale(1.5) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="gift-container" id="gift-box">
        
        <!-- La Carta -->
        <div class="letter" id="letter">
            <h1>Para ti ❤️</h1>
            <p>Eres mi lugar favorito en el mundo, gracias por cada momento a tu lado.</p>
            <img>
        </div>

        <!-- Parte inferior de la caja -->
        <div class="box-bottom"></div>

        <!-- Tapa y Moño arrastables -->
        <div class="lid-wrapper" id="lid-wrapper">
            <div class="bow" id="bow">🎀</div>
            <div class="box-lid"></div>
        </div>

        <!-- Texto guía -->
        <div class="instruction" id="instruction">Desliza el listón hacia abajo</div>

    </div>

    <script>
        const bow = document.getElementById('bow');
        const lidWrapper = document.getElementById('lid-wrapper');
        const letter = document.getElementById('letter');
        const instruction = document.getElementById('instruction');
        const giftContainer = document.getElementById('gift-box');

        let isDragging = false;
        let startY = 0;
        let currentY = 0;
        let giftOpened = false;

        // Iniciar el arrastre (Mouse y Táctil)
        bow.addEventListener('pointerdown', (e) => {
            if (giftOpened) return;
            isDragging = true;
            startY = e.clientY;
            bow.style.cursor = 'grabbing';
            instruction.style.animation = 'none'; // Detiene el parpadeo al interactuar
        });

        // Movimiento de arrastre
        window.addEventListener('pointermove', (e) => {
            if (!isDragging || giftOpened) return;
            
            let deltaY = e.clientY - startY;
            
            // Limitamos cuánto se puede arrastrar hacia abajo (resistencia)
            if (deltaY > 0 && deltaY < 120) {
                currentY = deltaY;
                // Movemos la tapa hacia abajo visualmente simulando que se jala
                lidWrapper.style.transform = `translateY(${currentY}px)`;
                
                // Cambiar el mensaje si pasa cierto límite
                if (currentY > 60) {
                    instruction.innerText = "¡SUELTA AHORA!";
                    instruction.style.color = "#c0392b";
                    bow.style.transform = "scale(1.1)";
                } else {
                    instruction.innerText = "Sigue jalando...";
                    instruction.style.color = "#d81b60";
                    bow.style.transform = "scale(1)";
                }
            }
        });

        // Soltar el listón
        window.addEventListener('pointerup', () => {
            if (!isDragging || giftOpened) return;
            isDragging = false;
            bow.style.cursor = 'grab';
            
            // Si jaló lo suficiente, se abre el regalo
            if (currentY > 60) {
                openGift();
            } else {
                // Si no jaló lo suficiente, rebota a su posición original
                lidWrapper.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                lidWrapper.style.transform = 'translateY(0)';
                bow.style.transform = "scale(1)";
                instruction.innerText = "Desliza el listón hacia abajo";
                
                // Limpiar la transición después del rebote
                setTimeout(() => {
                    lidWrapper.style.transition = 'none';
                }, 400);
            }
            currentY = 0;
        });

        function openGift() {
            giftOpened = true;
            
            // 1. Desaparecer instrucciones
            instruction.style.opacity = '0';
            
            // 2. Animar la tapa saltando hacia arriba y desapareciendo
            lidWrapper.style.transition = 'all 0.8s ease-in-out';
            lidWrapper.style.transform = 'translateY(-250px) scale(0.5)';
            lidWrapper.style.opacity = '0';
            
            // 3. Animar la carta saliendo de la caja
            letter.style.transition = 'all 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s';
            letter.style.transform = 'translateY(-160px)';
            letter.style.zIndex = '5'; // La trae al frente
            
            // 4. Disparar los corazones
            setTimeout(createHearts, 500);
        }

        function createHearts() {
            const numHearts = 35;
            for (let i = 0; i < numHearts; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.className = 'heart-particle';
                    
                    // Posición horizontal aleatoria dentro del contenedor
                    const randomLeft = Math.random() * 200; 
                    heart.style.left = `${randomLeft}px`;
                    heart.style.bottom = '150px';
                    
                    // Duración aleatoria de la animación para dar variedad
                    const animDuration = 1.5 + Math.random() * 1.5;
                    heart.style.animation = `flyUp ${animDuration}s ease-in forwards`;
                    
                    giftContainer.appendChild(heart);
                    
                    // Limpiar el DOM después de la animación
                    setTimeout(() => heart.remove(), animDuration * 1000);
                }, i * 80); // Escalonar la aparición de los corazones
            }
        }
    </script>
</body>
</html>
